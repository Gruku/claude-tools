  - id: v3-polish-027
    title: Kanban columns scroll-reset to top + scrollbar flicker every 3s
    status: in-review
    priority: high
    created: 2026-05-03T17:29
    last_referenced: 2026-05-03T18:51
    notes: 'Repro: open the kanban screen, scroll a column down, wait ~3 seconds.
      The column scroll position resets to the top. Scrollbar visibly flickers on/off
      at the same cadence.


      Root cause chain:

      1. main.js:128 `pollAutoStateForever` polls /api/auto/state every 3000ms unconditionally.

      2. store.js:47 `setAutoState` always calls `emit(''autoState'')` — no equality
      check against the previous value.

      3. kanban.js:363 subscribes to ''autoState'' and calls `paint()` on every emit.

      4. paint() does `boardGrid.replaceChildren()` (kanban.js:249) — wipes ALL column
      DOM (including .kanban-col-body scroll containers) and rebuilds them.


      Result: scroll position is destroyed every 3s; the rebuild also causes the scrollbar
      flicker the user sees.


      Fix candidates (need design call):

      - Skip emit when the autoState payload deep-equals the previous one (cheapest).

      - Decouple the autoState subscription from a full kanban paint — only the strip
      needs to repaint when autoState changes; cards don''t need a full re-render
      unless cursor.task_id changes.

      - If a full repaint is necessary, preserve scrollTop per column across paint()
      (capture before replaceChildren, restore after).


      Same root cause likely affects other screens that subscribe to ''autoState''
      or ''backlog'' and replaceChildren().</notes>

      </invoke>'
    estimate: S
    phase: ship-v3
    anchors:
    - plugins/taskmaster/viewer/js/screens/kanban.js
    - plugins/taskmaster/viewer/js/store.js
    - plugins/taskmaster/viewer/js/main.js
    started: 2026-05-03T18:00
    review_instructions: 'Open #/kanban. Scroll a column down. Wait 10+ seconds. Verify
      scroll position holds and there''s no scrollbar flicker every 3s. Browser-verified:
      scrollTop stayed at 200 for 83s (many poll cycles).'
    branch: feature/taskmaster-v3
  - id: v3-polish-028
    title: Auto-mode strip shows "Auto-mode · N running" for stopped/abandoned sessions
    status: in-review
    priority: high
    created: 2026-05-03T17:29
    last_referenced: 2026-05-03T18:51
    notes: 'Repro: with no auto-mode session active, the kanban top still shows "Auto-mode
      · 1 running" with a session timer ("running 3d") and a task pill. Visible whenever
      an auto-state document persists from a prior run.


      Root cause: auto-mode-strip.js:64 hide condition is `!autoState || !autoState.mode
      || !runs.length`. It never inspects autoState.stopped, autoState.completed_at,
      or any "is actively running" predicate. Any persisted auto-state document with
      a populated cursor passes the gate forever — even after the session is stopped
      or crashed.


      Observed shape on /api/auto/state for the .fixture-kanban seed: includes `stopped:
      false`, `pending: [...]`, no `completed_at`, mode: "walk", started_at much earlier.
      The shape lets us define what "running" means; the strip just doesn''t check
      it.


      Fix: define a single `isRunning(autoState)` predicate (e.g. `mode && !stopped
      && !completed_at && pending.length > 0`, optionally with a heartbeat-freshness
      check so a crashed session doesn''t appear live forever). Use it everywhere
      the strip / live-dot / sidebar pill decides whether to show "running" UI.


      Note: side dev server runs against .fixture-kanban which deliberately seeds
      a "walk" auto-state for visual fixture coverage. That''s correct for fixtures
      — the bug is the strip''s logic, not the fixture.


      Possible overlap with v3-polish-006 (slim down auto-mode header) — but 006 targets
      the auto-mode page header, this is the kanban-top strip. Worth a quick check
      whether both share the same isRunning predicate after fix.</notes>

      </invoke>'
    estimate: S
    phase: ship-v3
    anchors:
    - plugins/taskmaster/viewer/js/components/auto-mode-strip.js
    started: 2026-05-03T18:00
    review_instructions: With the bundled .fixture-kanban (which seeds a "walk" session)
      the strip should still appear — that's intentional fixture behavior, called
      out in the bug notes. To verify the fix, run a real auto-mode session, stop
      it, and confirm the kanban-top strip + topbar auto-status pill + sidebar live-dot
      all hide. Per-card live highlight on the cursor task should also disappear.
      Predicate `isAutoRunning(autoState)` (mode && !stopped && !completed_at && pending.length
      > 0) is now applied uniformly across all four sites.
    branch: feature/taskmaster-v3
  - id: v3-polish-029
    title: v3 viewer reads empty task list — `/api/backlog` doesn't expose flat top-level
      `tasks`
    status: done
    priority: high
    created: 2026-05-04T14:31
    last_referenced: 2026-05-05T04:25
    notes: 'Server <-> v3 viewer contract mismatch.


      `backlog_server._serve_json` (line 4651) returns the raw YAML, which keeps tasks
      nested under `epics[].tasks[]`. The v3 viewer''s kanban (`kanban.js:187`), table
      (`table.js:260`), and board-surface (`board-surface.js:63`) only read `backlog.tasks`
      (flat top-level array). Result: every list/board screen renders 0 tasks even
      though `/api/backlog` carries all of them.


      `load_v3` does NOT flatten either — it preserves the v2 nested shape under epics.
      So migrating to v3 schema does not fix this.


      Repro: open the v3 viewer (use_v3=true) on any backlog with epics[].tasks. Kanban
      shows "0 tasks · 0 visible" with all status columns empty.


      Fix landed in this worktree (hot-patch on feature/taskmaster-v3): in `_serve_json`,
      if `data["tasks"]` isn''t a list, derive it by flattening `epics[].tasks` and
      stamping each task with its parent epic id (so `t.epic` is always present for
      filtering). ~6 lines, no client-side changes.


      Validate: curl `/api/backlog | jq ''.tasks | length''` should match the sum
      of `epics[].tasks`. Then reload the v3 kanban — task counts should populate,
      all status columns render cards, epic chip counts non-zero.


      Discovered while dogfooding the v3 viewer for this feature branch on 2026-05-04.'
