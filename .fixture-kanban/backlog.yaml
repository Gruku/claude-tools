  - id: v3-050
    title: "Auto-mode runner contract"
    status: in_review
    priority: critical
    estimate: L
    phase: P-03
    epic: auto-mode
    branch: "feat/runner-contract"
    worktree: ".worktrees/v3-050"
    started: "2026-04-28T09:00:00Z"
    created: "2026-04-26T11:00:00Z"
    description: "Define the contract between the auto-mode runner and the viewer — state.json schema, events.jsonl event types, hooks.jsonl format."
    specification: |
      The runner emits three streams the viewer reads:

      - `state.json` — current cursor (stage, task_id, started_at), plus running/paused/stopped flags
      - `events.jsonl` — append-only log of stage transitions and tool calls
      - `hooks.jsonl` — pre/post-tool hook firings with status

      Viewer reads via 200ms poll; runner writes atomically (tmp + rename).
    plan: |
      1. Pin schemas in `plugins/taskmaster/auto/schemas/`
      2. Add JSON-schema validation in the server before exposing /api/auto/state
      3. Document write-atomicity expectations in the runner spec
      4. Add a fixture session (v3-031) that exercises every event type
    notes: "Schema versioning needs a hard call before this lands — propose `schema_version: 1` on every record, viewer rejects mismatches."
    review_instructions: "Verify all event types from `events.jsonl` have a corresponding handler in `viewer/js/screens/auto-mode.js`. Eyeball the spine renders correctly when a session is paused."
    spec_review:
      verdict: concerns
      codex_note: "Schema looks good; one concern — `hooks.jsonl` format varies by hook source. Consider a discriminator field rather than relying on shape inference."
    depends_on: [v3-009]
    unblocks: [v3-014, v3-031]
    anchors:
      - {kind: file,   label: "auto/schemas/state.schema.json",  href: "plugins/taskmaster/auto/schemas/state.schema.json"}
      - {kind: file,   label: "auto/schemas/events.schema.json", href: "plugins/taskmaster/auto/schemas/events.schema.json"}
      - {kind: pr,     label: "PR #142",                         href: "https://github.com/example/repo/pull/142"}
      - {kind: spec,   label: "design-v3-narrative-continuity",  href: "docs/design-v3-narrative-continuity.md"}
    docs:
