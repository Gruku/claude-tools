- id: jira
  name: "Jira \u2194 Taskmaster Integration"
  status: active
  description: 'V1 of the Jira integration: tracker entity (read-only mirror of an
    external issue), per-project multi-instance Jira config with env-var token, asymmetric
    pull-and-manual-push commands, and a dedicated `taskmaster:jira` router skill.
    Spec: plugins/taskmaster/docs/specs/jira-integration-design.md. Implementation
    target is the taskmaster plugin (this repo). Goals: link Taskmaster tasks to a
    parent Jira issue without duplicating Jira data; pull Jira metadata into a local
    cached mirror; gate every write behind explicit user confirmation; multi-Jira
    coexistence via per-instance env vars; clean separation in a new `backlog_jira_*`
    MCP namespace and a new router skill so existing skills only get light soft hooks.
    Non-goals (V1): bidirectional auto sync, webhooks, cross-Jira linking, sprint/board
    mirroring, bulk decompose, custom fields, keychain storage.'
